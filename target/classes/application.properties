# =============================================
# APPLICATION CONFIGURATION
# Matrimonial Platform - Phase 1
# =============================================

# ----- Server -----
server.port=8080

# ----- Application Name -----
spring.application.name=PrajapatiSamaj

# =============================================
# DATABASE CONFIGURATION (MySQL)
# Update username/password as per your local MySQL setup
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/matrimonial_db
#?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE CONFIGURATION
# =============================================
# update  → auto-creates/updates tables based on entities (use for dev)
# validate → only validates schema (use for production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT CONFIGURATION
# =============================================
# Secret key (min 256-bit / 32 chars) — change before production!
jwt.secret=PrajapatiSamajMatrimonialSecretKey2026JWTConfig
# Token valid for 24 hours (in milliseconds)
jwt.expiration=86400000

# =============================================
# EMAIL CONFIGURATION (SMTP)
# Using Gmail SMTP — replace with your credentials
# For production: use SendGrid or AWS SES
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pragneshmaru12112001@gmail.com
spring.mail.password=QSCLQAEN8562
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# OTP CONFIGURATION
# =============================================
# OTP expires in 10 minutes (600000 milliseconds)
otp.expiry.minutes=10

# =============================================
# FILE UPLOAD CONFIGURATION
# Maximum file upload size (photos)
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# Local folder where profile photos will be stored (Phase 1)
# Phase 2: replace with AWS S3 bucket
file.upload.dir=uploads/photos

# =============================================
# LOGGING
# =============================================
logging.level.com.matrimonial=DEBUG
logging.level.org.springframework.security=INFO
